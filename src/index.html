<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <title>Tailwind Practice Project</title>
</head>
<body>
   
 <section class="relative w-full h-screen overflow-hidden">

  <!-- Background Image -->
  <img src="Images/main.jpg"
       class="absolute top-0 left-0 w-full h-full object-cover object-bottom">

  <!-- Dark Overlay -->
  <div class="absolute top-0 left-0 w-full h-full bg-black/50 z-10"></div>

  <!-- Header -->
  <header class="absolute top-0 left-0 w-full z-20">
    <div class="flex items-center justify-between h-24 max-w-[1240px] mx-auto px-6">

      <!-- Logo Left -->
      <figure>
        <img src="Images/logo (2).png" class="w-32">
      </figure>

      <!-- Navbar Right -->
      <nav>
        <ul class="flex gap-12 text-white text-[17px] font-jost font-medium">
          <li><a href="">Home</a></li>
          <li><a href="">Apparel</a></li>
          <li><a href="">Shoes</a></li>
          <li><a href="">About Us</a></li>
          <li ><a href="">Contact Us</a></li>
          <li>
            <a href="">
              <i class="fa-solid fa-cart-arrow-down text-xl"></i>
            </a>
          </li>
        </ul>
      </nav>

    </div>
  </header>

  
<!-- Hero Section -->
<div class="relative w-full h-screen bg-[url('Images/main.jpg')] bg-cover bg-center">
  
  <!-- Hero Heading -->
  <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 text-center px-4 md:px-0 max-w-full md:max-w-3xl">
    <h1 class="fraunces-semibold text-white text-3xl md:text-7xl leading-snug md:leading-tight drop-shadow-2xl whitespace-pre-line">
      Strength in Motion,<br>
      Style in Every Step
    </h1>
    <!-- Paragraph under heading -->
    <p class="mt-6 text-gray-200 text-lg md:text-xl font-jost drop-shadow-lg max-w-lg mx-auto">
      Premium Gym Apparel & Shoes for Champions Who Dare to Push Limits
    </p>
    <a href="#shop"
   class="inline-block mt-6 px-8 py-3 bg-yellow-500 text-black font-bold rounded-lg shadow-lg
   transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl hover:bg-yellow-400">
   Shop Now
</a>
  </div>
   

</section class="bg-white py-[50px]">
<div class="max-w-[1240] max-auto grid md:grid-cols-2">
  <figure>
<img src="Images/about.png" alt="About">
  </figure>
  <article>

  </article>
</div>
<section>

</section>
</body>

</html>
